<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Su Li Fa — Toi Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    /*
      GitHub-та файлдарды былай сал:
      index.html
      sulifa.png          — сен жіберген негізгі фон
      rock.png            — тас қол PNG
      scissors.png        — қайшы қол PNG
      paper.png           — қағаз қол PNG
    */

    .game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-image: url("sulifa.png");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #000;
    }

    .board {
      position: absolute;
      left: 50%;
      top: 72%;
      transform: translate(-50%, -50%);
      width: min(48vw, 760px);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.7vw;
      z-index: 5;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border-radius: 18%;
      border: 2px solid rgba(255, 0, 0, 0.85);
      background:
        radial-gradient(circle at center, rgba(0, 0, 0, 0.95) 42%, rgba(130, 0, 0, 0.55) 63%, rgba(255, 0, 0, 0.85) 100%);
      box-shadow:
        0 0 10px rgba(255, 0, 0, 0.95),
        inset 0 0 18px rgba(255, 0, 0, 0.45);
      color: #fff;
      font-size: clamp(16px, 2vw, 34px);
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s ease;
      text-shadow: 0 2px 6px #000;
    }

    .cell:hover {
      transform: scale(1.08);
      box-shadow:
        0 0 18px rgba(255, 0, 0, 1),
        0 0 34px rgba(255, 0, 0, 0.75),
        inset 0 0 20px rgba(255, 255, 255, 0.18);
    }

    .cell.left-selected {
      border-color: #ffffff;
      box-shadow: 0 0 24px #fff, 0 0 42px rgba(255, 255, 255, 0.65);
    }

    .cell.right-selected {
      border-color: #ffd000;
      box-shadow: 0 0 24px #ffd000, 0 0 42px rgba(255, 208, 0, 0.65);
    }

    .side-result {
      position: absolute;
      top: 48%;
      transform: translateY(-50%) scale(0.7);
      width: min(27vw, 430px);
      min-height: 38vh;
      z-index: 8;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .side-result.show {
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    .side-result.left {
      left: 3vw;
    }

    .side-result.right {
      right: 3vw;
    }

    .number-badge {
      min-width: clamp(95px, 9vw, 150px);
      height: clamp(95px, 9vw, 150px);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.82);
      border: 4px solid #fff;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(44px, 7vw, 95px);
      font-weight: 1000;
      line-height: 1;
      text-shadow: 0 0 14px #b40000;
      box-shadow:
        0 0 24px rgba(255, 255, 255, 0.75),
        0 0 54px rgba(180, 0, 0, 0.9);
      margin-bottom: 18px;
    }

    .hand-img {
      max-width: 100%;
      max-height: 32vh;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(255, 255, 255, 0.55)) drop-shadow(0 12px 22px rgba(0, 0, 0, 1));
    }

    .hand-name {
      margin-top: 10px;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      border: 2px solid rgba(255, 255, 255, 0.75);
      color: #fff;
      font-size: clamp(18px, 2vw, 34px);
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #b40000;
    }

    .winner-text {
      position: absolute;
      left: 50%;
      top: 14%;
      transform: translateX(-50%) scale(0.8);
      z-index: 12;
      opacity: 0;
      color: #fff;
      font-size: clamp(30px, 5vw, 82px);
      font-weight: 1000;
      letter-spacing: 3px;
      text-align: center;
      text-transform: uppercase;
      text-shadow:
        0 0 8px #000,
        0 0 16px #b40000,
        0 0 34px #ff0000;
      transition: 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .winner-text.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .control-panel {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: flex;
      gap: 10px;
      opacity: 0.2;
      transition: 0.2s ease;
    }

    .control-panel:hover {
      opacity: 1;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      font-weight: 900;
      cursor: pointer;
      color: #fff;
      background: rgba(120, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 6px 18px rgba(0,0,0,.45);
    }

    button:hover {
      background: rgba(200, 0, 0, 0.95);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 2.5vh;
      transform: translateX(-50%);
      z-index: 4;
      color: rgba(255, 255, 255, 0.75);
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      padding: 8px 18px;
      font-size: clamp(12px, 1.3vw, 18px);
      letter-spacing: 1px;
    }

    @media (max-aspect-ratio: 4/3) {
      .board {
        top: 74%;
        width: 62vw;
      }

      .side-result.left {
        left: 1vw;
      }

      .side-result.right {
        right: 1vw;
      }
    }
  </style>
</head>
<body>
  <main class="game" id="game">
    <div class="winner-text" id="winnerText"></div>

    <section class="side-result left" id="leftResult">
      <div class="number-badge" id="leftNumber">7</div>
      <img class="hand-img" id="leftHand" src="rock.png" alt="Сол жақ қол" />
      <div class="hand-name" id="leftName">ТАС</div>
    </section>

    <section class="side-result right" id="rightResult">
      <div class="number-badge" id="rightNumber">11</div>
      <img class="hand-img" id="rightHand" src="scissors.png" alt="Оң жақ қол" />
      <div class="hand-name" id="rightName">ҚАЙШЫ</div>
    </section>

    <section class="board" id="board"></section>

    <div class="hint" id="hint">1-басу: сол жақ қонақ • 2-басу: оң жақ қонақ</div>

    <div class="control-panel">
      <button onclick="resetRound()">Келесі ойын</button>
      <button onclick="shuffleHands()">Араластыру</button>
      <button onclick="toggleFullscreen()">Full screen</button>
    </div>
  </main>

  <script>
    const hands = [
      {
        key: "rock",
        name: "ТАС",
        img: "rock.png",
        beats: "scissors"
      },
      {
        key: "scissors",
        name: "ҚАЙШЫ",
        img: "scissors.png",
        beats: "paper"
      },
      {
        key: "paper",
        name: "ҚАҒАЗ",
        img: "paper.png",
        beats: "rock"
      }
    ];

    const state = {
      hiddenHands: [],
      firstPick: null,
      secondPick: null,
      step: 1,
      locked: false
    };

    const board = document.getElementById("board");
    const leftResult = document.getElementById("leftResult");
    const rightResult = document.getElementById("rightResult");
    const leftNumber = document.getElementById("leftNumber");
    const rightNumber = document.getElementById("rightNumber");
    const leftHand = document.getElementById("leftHand");
    const rightHand = document.getElementById("rightHand");
    const leftName = document.getElementById("leftName");
    const rightName = document.getElementById("rightName");
    const winnerText = document.getElementById("winnerText");
    const hint = document.getElementById("hint");

    function randomHand() {
      return hands[Math.floor(Math.random() * hands.length)];
    }

    function otherHand(currentKey) {
      const available = hands.filter(h => h.key !== currentKey);
      return available[Math.floor(Math.random() * available.length)];
    }

    function init() {
      board.innerHTML = "";

      for (let i = 1; i <= 30; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = i;
        cell.dataset.number = i;
        cell.addEventListener("click", () => chooseCell(i, cell));
        board.appendChild(cell);
      }

      shuffleHands(false);
      resetRound(false);
    }

    function shuffleHands(show = true) {
      state.hiddenHands = Array.from({ length: 30 }, () => ({ ...randomHand() }));

      // Бірінші және екінші таңдауда совпадение болмасын деп карта алдын ала араласады.
      // Сонда 30 ұяшық ішінде бәрібір рандом, бірақ екі таңдалған белгі бірдей болса автоматты ауысады.
      if (show) {
        winnerText.textContent = "АРАЛАСТЫРЫЛДЫ";
        winnerText.classList.add("show");
        setTimeout(() => winnerText.classList.remove("show"), 900);
      }
    }

    function chooseCell(number, cell) {
      if (state.locked) return;

      if (state.step === 1) {
        clearSelectedCells();
        state.firstPick = {
          number,
          hand: { ...state.hiddenHands[number - 1] }
        };

        cell.classList.add("left-selected");
        showSide("left", state.firstPick);
        state.step = 2;
        hint.textContent = "Енді оң жақ қонақ ұяшық таңдайды";
        return;
      }

      if (state.step === 2) {
        if (state.firstPick && state.firstPick.number === number) return;

        state.secondPick = {
          number,
          hand: { ...state.hiddenHands[number - 1] }
        };

        // Ең маңызды жер: совпадение болмасын.
        // Егер бірдей шықса, екінші қол автоматты түрде басқа PNG қолға ауысады.
        if (state.firstPick.hand.key === state.secondPick.hand.key) {
          state.secondPick.hand = { ...otherHand(state.firstPick.hand.key) };
          state.hiddenHands[number - 1] = { ...state.secondPick.hand };
        }

        cell.classList.add("right-selected");
        showSide("right", state.secondPick);
        showWinner();
        state.locked = true;
        hint.textContent = "Келесі ойын үшін 'Келесі ойын' батырмасын бас";
      }
    }

    function showSide(side, pick) {
      const panel = side === "left" ? leftResult : rightResult;
      const numberEl = side === "left" ? leftNumber : rightNumber;
      const handEl = side === "left" ? leftHand : rightHand;
      const nameEl = side === "left" ? leftName : rightName;

      numberEl.textContent = pick.number;
      handEl.src = pick.hand.img;
      nameEl.textContent = pick.hand.name;

      panel.classList.remove("show");
      void panel.offsetWidth;
      panel.classList.add("show");
    }

    function showWinner() {
      const left = state.firstPick.hand;
      const right = state.secondPick.hand;

      if (left.beats === right.key) {
        winnerText.textContent = "СОЛ ЖАҚ ЖЕҢДІ";
      } else if (right.beats === left.key) {
        winnerText.textContent = "ОҢ ЖАҚ ЖЕҢДІ";
      } else {
        // Бұл болмайды, себебі совпадение автоматты ауысады.
        winnerText.textContent = "ҚАЙТА ТАҢДАУ";
      }

      winnerText.classList.add("show");
    }

    function resetRound(reshuffle = true) {
      state.firstPick = null;
      state.secondPick = null;
      state.step = 1;
      state.locked = false;

      leftResult.classList.remove("show");
      rightResult.classList.remove("show");
      winnerText.classList.remove("show");
      winnerText.textContent = "";
      hint.textContent = "1-басу: сол жақ қонақ • 2-басу: оң жақ қонақ";
      clearSelectedCells();

      if (reshuffle) shuffleHands(false);
    }

    function clearSelectedCells() {
      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("left-selected", "right-selected");
      });
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    // Пернетақта ыңғайы:
    // Space немесе Enter — келесі ойын
    // F — fullscreen
    document.addEventListener("keydown", (e) => {
      if (e.key === " " || e.key === "Enter") resetRound(true);
      if (e.key.toLowerCase() === "f") toggleFullscreen();
    });

    init();
  </script>
</body>
</html>
