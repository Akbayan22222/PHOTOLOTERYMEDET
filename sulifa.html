<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Su Li Fa — Toy Screen</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    /*
      GitHub-қа салатын файлдар:
      1) index.html
      2) sulifa.png  — сен жіберген фон сурет

      Қолдардың PNG суреттері интернеттен автоматты алынады.
      Қаласаң кейін өз PNG суреттеріңмен ауыстыра аласың.
    */

    :root {
      --red: #b40000;
      --red2: #ff1515;
      --gold: #ffd36a;
      --white: #ffffff;
    }

    .game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-image: url("sulifa.png");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #000;
    }

    /* 30 ұяшық фотоның төменгі тақтасына орналасады. Фон көрініп тұруы үшін ұяшықтар жартылай мөлдір. */
    .board {
      position: absolute;
      left: 50%;
      top: 82.2%;
      transform: translate(-50%, -50%) perspective(900px) rotateX(4deg);
      width: min(43vw, 720px);
      height: min(20vw, 310px);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: min(0.78vw, 12px);
      z-index: 5;
      padding: min(0.55vw, 9px);
    }

    .cell {
      position: relative;
      border-radius: 50%;
      border: min(0.18vw, 3px) solid rgba(255, 22, 22, 0.85);
      background:
        radial-gradient(circle at center,
          rgba(0, 0, 0, 0.16) 0%,
          rgba(0, 0, 0, 0.46) 47%,
          rgba(255, 0, 0, 0.32) 70%,
          rgba(255, 0, 0, 0.70) 100%);
      color: rgba(255, 255, 255, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(13px, 1.7vw, 31px);
      font-weight: 1000;
      cursor: pointer;
      text-shadow: 0 3px 7px #000, 0 0 11px #ff0000;
      box-shadow:
        0 0 9px rgba(255, 0, 0, 0.85),
        inset 0 0 14px rgba(255, 0, 0, 0.28);
      transition: 0.13s ease;
      overflow: hidden;
    }

    .cell::after {
      content: "";
      position: absolute;
      inset: 17%;
      border-radius: 50%;
      border: 1px solid rgba(255, 0, 0, 0.36);
      background: rgba(0, 0, 0, 0.30);
      z-index: -1;
    }

    .cell:hover {
      transform: scale(1.12);
      background:
        radial-gradient(circle at center,
          rgba(255, 255, 255, 0.18) 0%,
          rgba(0, 0, 0, 0.35) 45%,
          rgba(255, 0, 0, 0.48) 72%,
          rgba(255, 0, 0, 0.95) 100%);
      box-shadow:
        0 0 16px rgba(255, 255, 255, 0.70),
        0 0 28px rgba(255, 0, 0, 1),
        inset 0 0 18px rgba(255, 255, 255, 0.22);
    }

    .cell.selected-a {
      color: #000;
      background: radial-gradient(circle, #fff 0%, #ffdede 35%, #ff0000 100%);
      border-color: #fff;
      box-shadow: 0 0 20px #fff, 0 0 45px #ff0000;
    }

    .cell.selected-b {
      color: #000;
      background: radial-gradient(circle, #ffe98a 0%, #ffc400 42%, #ff0000 100%);
      border-color: var(--gold);
      box-shadow: 0 0 20px var(--gold), 0 0 45px #ff0000;
    }

    /* Нәтиже бір жерде, экранның ортасында шығады */
    .versus-modal {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.94);
      transition: 0.22s ease;
    }

    .versus-modal.show {
      opacity: 1;
      transform: scale(1);
    }

    .dark-glass {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,.18) 0%, rgba(0,0,0,.30) 58%, rgba(0,0,0,.48) 100%);
      backdrop-filter: blur(1px);
    }

    .fight-card {
      position: relative;
      width: min(74vw, 1180px);
      height: min(50vh, 520px);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: min(3vw, 42px);
      padding: min(3vw, 46px);
      border-radius: 34px;
      border: 3px solid rgba(255, 255, 255, 0.78);
      background:
        linear-gradient(135deg, rgba(0,0,0,.78), rgba(80,0,0,.70), rgba(0,0,0,.78));
      box-shadow:
        0 0 28px rgba(255,255,255,.38),
        0 0 70px rgba(255,0,0,.75),
        inset 0 0 40px rgba(255,0,0,.23);
    }

    .fighter {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }

    .picked-number {
      width: clamp(84px, 8vw, 145px);
      height: clamp(84px, 8vw, 145px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(42px, 6vw, 92px);
      font-weight: 1000;
      color: #fff;
      background: #070707;
      border: 4px solid #fff;
      box-shadow: 0 0 20px #fff, 0 0 38px #ff0000;
      text-shadow: 0 0 14px #ff0000;
      margin-bottom: 8px;
    }

    .hand {
      width: min(25vw, 390px);
      height: min(25vw, 330px);
      object-fit: contain;
      filter:
        drop-shadow(0 0 10px rgba(255,255,255,.8))
        drop-shadow(0 0 24px rgba(255,0,0,.75))
        drop-shadow(0 18px 22px rgba(0,0,0,1));
    }

    .fighter:first-child .hand {
      transform: scaleX(-1);
    }

    .vs {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 1000;
      text-align: center;
      text-shadow: 0 0 15px #000, 0 0 30px #ff0000;
    }

    .vs-main {
      font-size: clamp(42px, 7vw, 118px);
      line-height: .85;
      letter-spacing: 2px;
    }

    .winner {
      margin-top: 18px;
      min-width: clamp(190px, 22vw, 350px);
      padding: 10px 20px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.75);
      background: rgba(0,0,0,.68);
      color: #fff;
      font-size: clamp(18px, 2.4vw, 38px);
      font-weight: 1000;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .countdown {
      margin-top: 10px;
      color: rgba(255,255,255,.88);
      font-size: clamp(14px, 1.5vw, 24px);
      font-weight: 800;
    }

    .mini-hint {
      position: absolute;
      left: 50%;
      bottom: 3.2vh;
      transform: translateX(-50%);
      z-index: 6;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.74);
      font-size: clamp(12px, 1.2vw, 18px);
      letter-spacing: 1px;
      text-align: center;
      pointer-events: none;
    }

    .controls {
      position: absolute;
      right: 24px;
      bottom: 24px;
      z-index: 50;
      display: flex;
      gap: 10px;
      opacity: 1;
      transition: .2s ease;
    }

    button {
      border: 1px solid rgba(255,255,255,.35);
      background: rgba(110,0,0,.88);
      color: #fff;
      border-radius: 12px;
      padding: 10px 13px;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    button:hover {
      background: rgba(190,0,0,.96);
    }

    @media (max-aspect-ratio: 4/3) {
      .board {
        top: 80.5%;
        width: 56vw;
        height: 26vw;
      }

      .fight-card {
        width: 86vw;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="board" id="board"></section>

    <div class="mini-hint" id="miniHint">Екі ұяшық таңдаңыз. Нәтиже 1 VS 1 болып осы экранда ашылады.</div>

    <section class="versus-modal" id="modal">
      <div class="dark-glass"></div>
      <div class="fight-card">
        <div class="fighter">
          <div class="picked-number" id="numA">7</div>
          <img class="hand" id="handA" alt="hand A" />
        </div>

        <div class="vs">
          <div class="vs-main">1 VS 1</div>
          <div class="winner" id="winnerText">ЖЕҢІМПАЗ</div>
          <div class="countdown" id="countdown">Экранның кез келген жерін бассаңыз қайта басталады</div>
        </div>

        <div class="fighter">
          <div class="picked-number" id="numB">11</div>
          <img class="hand" id="handB" alt="hand B" />
        </div>
      </div>
    </section>

    <div class="controls">
      <button onclick="newGame()">NEW</button>
    </div>
  </main>

  <script>
    const HANDS = [
      {
        key: "rock",
        name: "ТАС",
        beats: "scissors",
        img: "https://commons.wikimedia.org/wiki/Special:Redirect/file/Rock-paper-scissors%20(rock).png"
      },
      {
        key: "scissors",
        name: "ҚАЙШЫ",
        beats: "paper",
        img: "https://commons.wikimedia.org/wiki/Special:Redirect/file/Rock-paper-scissors%20(scissors).png"
      },
      {
        key: "paper",
        name: "ҚАҒАЗ",
        beats: "rock",
        img: "https://commons.wikimedia.org/wiki/Special:Redirect/file/Rock-paper-scissors%20(paper).png"
      }
    ];

    const state = {
      hidden: [],
      pickA: null,
      pickB: null,
      step: 1,
      locked: false,
      resetTimer: null,
      countdownTimer: null,
      secondsLeft: 0
    };

    const board = document.getElementById("board");
    const modal = document.getElementById("modal");
    const numA = document.getElementById("numA");
    const numB = document.getElementById("numB");
    const handA = document.getElementById("handA");
    const handB = document.getElementById("handB");
    const winnerText = document.getElementById("winnerText");
    const countdown = document.getElementById("countdown");
    const miniHint = document.getElementById("miniHint");

    function randomHand() {
      return HANDS[Math.floor(Math.random() * HANDS.length)];
    }

    function notSameHand(key) {
      const variants = HANDS.filter(hand => hand.key !== key);
      return variants[Math.floor(Math.random() * variants.length)];
    }

    function buildBoard() {
      board.innerHTML = "";

      // Орналасу: 30 ұяшық фотоның төменіндегі тақтаға 6 x 5 болып таралады.
      // Нөмірлер экраннан анық көрінеді, бірақ фонды қатты жаппайды.
      for (let i = 1; i <= 30; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = i;
        cell.dataset.number = i;
        cell.onclick = () => chooseCell(i, cell);
        board.appendChild(cell);
      }
    }

    function shuffleHiddenHands() {
      state.hidden = Array.from({ length: 30 }, () => ({ ...randomHand() }));
    }

    function chooseCell(number, cell) {
      if (state.locked) return;
      if (state.pickA && state.pickA.number === number) return;

      if (state.step === 1) {
        state.pickA = {
          number,
          hand: { ...state.hidden[number - 1] }
        };
        cell.classList.add("selected-a");
        state.step = 2;
        miniHint.textContent = "Екінші ұяшықты таңдаңыз";
        return;
      }

      if (state.step === 2) {
        state.pickB = {
          number,
          hand: { ...state.hidden[number - 1] }
        };

        // Совпадение болмасын: бірдей қол шықса, екінші қол автоматты түрде басқа қолға өзгереді.
        if (state.pickA.hand.key === state.pickB.hand.key) {
          state.pickB.hand = { ...notSameHand(state.pickA.hand.key) };
        }

        cell.classList.add("selected-b");
        state.locked = true;
        openResult();
      }
    }

    function openResult() {
      numA.textContent = state.pickA.number;
      numB.textContent = state.pickB.number;
      handA.src = state.pickA.hand.img;
      handB.src = state.pickB.hand.img;

      const a = state.pickA.hand;
      const b = state.pickB.hand;

      if (a.beats === b.key) {
        winnerText.textContent = `${state.pickA.number} ЖЕҢДІ`;
      } else if (b.beats === a.key) {
        winnerText.textContent = `${state.pickB.number} ЖЕҢДІ`;
      } else {
        // Бұл жерге түспейді, себебі бірдей шықса автоматты ауыстырылады.
        winnerText.textContent = "ҚАЙТА";
      }

      modal.classList.add("show");
      miniHint.textContent = "Нәтиже ашылды. Қайта бастау үшін NEW батырмасын басыңыз.";
      countdown.textContent = "Қайта бастау үшін NEW батырмасын басыңыз";
    }

    function startAutoRefresh() {
      // Автоматты 30 секундтық жаңарту өшірілді.
      // Енді нәтиже шыққаннан кейін экранның кез келген жерін басса, ойын қайта басталады.
    }

    function newGame() {
      clearTimeout(state.resetTimer);
      clearInterval(state.countdownTimer);

      state.pickA = null;
      state.pickB = null;
      state.step = 1;
      state.locked = false;

      modal.classList.remove("show");
      miniHint.textContent = "Екі ұяшық таңдаңыз. Нәтиже 1 VS 1 болып осы экранда ашылады.";

      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("selected-a", "selected-b");
      });

      shuffleHiddenHands();
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === " " || e.key === "Enter") newGame();
      if (e.key.toLowerCase() === "f") toggleFullscreen();
    });

    // Қайта бастау тек NEW батырмасы арқылы істейді.
    // Экранның басқа жерін басу ұяшық таңдауға кедергі жасамайды.

    buildBoard();
    newGame();
  </script>
</body>
</html>
