<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ЛОТЕРЕЯ ЭКРАН</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #winner-card { text-align: center; display: none; z-index: 10; }
        #winner-photo { width: 300px; height: 300px; border-radius: 50%; border: 10px solid gold; box-shadow: 0 0 50px gold; object-fit: cover; }
        #winner-name { font-size: 80px; color: gold; margin-top: 20px; text-transform: uppercase; }
        #bg-photos { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0.3; }
        .fly-photo { position: absolute; width: 100px; height: 100px; border-radius: 50%; object-fit: cover; transition: 0.5s; }
    </style>
</head>
<body>
    <div id="bg-photos"></div>
    <div id="winner-card">
        <h2 style="font-size: 40px;">ПОБЕДИТЕЛЬ!</h2>
        <img id="winner-photo" src="">
        <div id="winner-name"></div>
    </div>

    <script>
        const ADMIN_ID = 'medet_luck_2026';
        const peer = new Peer(ADMIN_ID);
        let guests = [];

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.name && data.photo) {
                    guests.push(data); // Сохраняем гостя
                    addPhotoToBG(data.photo);
                }
                if (data.start) startSpin();
            });
        });

        function addPhotoToBG(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'fly-photo';
            img.style.left = Math.random() * 90 + '%';
            img.style.top = Math.random() * 90 + '%';
            document.getElementById('bg-photos').appendChild(img);
        }

        function startSpin() {
            if (guests.length === 0) return alert("Нет участников!");
            document.getElementById('winner-card').style.display = "none";
            
            let timer = 0;
            let interval = setInterval(() => {
                const randomGuest = guests[Math.floor(Math.random() * guests.length)];
                showWinner(randomGuest);
                timer += 100;
                if (timer > 4000) { // Крутим 4 секунды
                    clearInterval(interval);
                    document.getElementById('winner-card').classList.add('winner-anim');
                }
            }, 100);
        }

        function showWinner(guest) {
            const card = document.getElementById('winner-card');
            card.style.display = "block";
            document.getElementById('winner-photo').src = guest.photo;
            document.getElementById('winner-name').innerText = guest.name;
        }
    </script>
</body>
</html>
